<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>360 Video PWA</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      #ui-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10;
        pointer-events: none;
      }
      #start-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        font-size: 20px;
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        pointer-events: auto;
      }
      #download-log-button {
        position: absolute;
        bottom: 20px;
        right: 20px;
        padding: 10px 20px;
        font-size: 14px;
        background-color: rgba(255, 255, 255, 0.7);
        color: #000;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui-container">
      <button id="start-button">Start 360 Video</button>
      <button id="download-log-button">Download Log</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
